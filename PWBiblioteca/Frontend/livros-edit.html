<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editar Livro - Biblioteca</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="container">
    <h1>Editar Livro</h1>
    <hr class="rule">

    <form id="editForm">
      <p class="info">ID: <span id="recordId"></span></p>

      <label for="titulo">Título</label>
      <input type="text" id="titulo" required>

      <label for="autor">Autor</label>
      <input type="text" id="autor" required>

      <label for="isbn">ISBN</label>
      <input type="text" id="isbn" required>

      <label for="quantidade">Quantidade (cópias em stock)</label>
      <input type="number" id="quantidade" min="0" required>

      <label for="estado">Estado</label>
      <select id="estado">
        <option value="disponivel">disponivel</option>
        <option value="indisponivel">indisponivel</option>
      </select>

      <p class="info" id="stockInfo"></p>

      <button type="submit" class="btn">Guardar edição</button>
      <button type="button" class="btn danger" onclick="eliminar()">Remover livro</button>
      <a href="livros.html" class="btn secondary">Voltar</a>

      <p id="message" class="message"></p>
    </form>
  </div>

  <script src="js/config.js"></script>
  <script>
    checkAuth();
    if (!isStaff()) {
      window.location.href = 'livros.html';
    }

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    async function loadLivro() {
      const message = document.getElementById('message');
      if (!id) { message.textContent = 'ID do livro não encontrado.'; return; }

      try {
        const response = await fetch(`${API_BASE}/v1/livros/${id}`, {
          method: 'GET',
          headers: authHeaders(),
        });
        if (!response.ok) throw new Error('Erro ao carregar livro.');

        const item = await response.json();
        document.getElementById('recordId').textContent = item.id;
        document.getElementById('titulo').value = item.titulo || '';
        document.getElementById('autor').value = item.autor || '';
        document.getElementById('isbn').value = item.isbn || '';
        document.getElementById('quantidade').value = item.quantidade;
        document.getElementById('estado').value = item.estado || 'disponivel';
        document.getElementById('stockInfo').textContent =
          `Cópias livres: ${item.disponiveis} de ${item.quantidade} (em reserva: ${item.ocupadas}).`;
      } catch (error) {
        message.textContent = error.message;
      }
    }

    document.getElementById('editForm').addEventListener('submit', async function (event) {
      event.preventDefault();
      const message = document.getElementById('message');

      const body = {
        titulo: document.getElementById('titulo').value,
        autor: document.getElementById('autor').value,
        isbn: document.getElementById('isbn').value,
        quantidade: Number(document.getElementById('quantidade').value),
        estado: document.getElementById('estado').value,
      };

      try {
        const response = await fetch(`${API_BASE}/v1/livros/${id}`, {
          method: 'PUT',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify(body),
        });
        if (response.status === 200) {
          window.location.href = 'livros.html';
        } else {
          const data = await response.json();
          message.textContent = data.error || 'Erro ao atualizar livro.';
        }
      } catch {
        message.textContent = 'Não foi possível ligar ao servidor.';
      }
    });

    async function eliminar() {
      const message = document.getElementById('message');
      if (!confirm('Tem a certeza que pretende remover este livro?')) return;
      try {
        const response = await fetch(`${API_BASE}/v1/livros/${id}`, {
          method: 'DELETE',
          headers: authHeaders(),
        });
        if (response.status === 204) {
          window.location.href = 'livros.html';
        } else {
          const data = await response.json();
          message.textContent = data.error || 'Erro ao remover livro.';
        }
      } catch {
        message.textContent = 'Não foi possível ligar ao servidor.';
      }
    }

    loadLivro();
  </script>
</body>
</html>
