<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editar Utilizador - Biblioteca</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="container">
    <h1>Editar Utilizador</h1>
    <hr class="rule">

    <form id="editForm">
      <p class="info">ID: <span id="recordId"></span></p>
      <p class="info">Role atual: <span id="roleAtual"></span></p>

      <label for="nome">Nome</label>
      <input type="text" id="nome" required>

      <label for="email">Email</label>
      <input type="email" id="email" required>

      <button type="submit" class="btn">Guardar edição</button>
      <button type="button" class="btn danger" onclick="eliminar()">Eliminar conta</button>
      <a href="utilizadores.html" class="btn secondary">Voltar</a>

      <p id="message" class="message"></p>
    </form>
  </div>

  <script src="js/config.js"></script>
  <script>
    checkAuth();
    if (!isAdmin()) {
      window.location.href = 'dashboard.html';
    }

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    async function loadUtilizador() {
      const message = document.getElementById('message');
      if (!id) { message.textContent = 'ID do utilizador não encontrado.'; return; }

      try {
        const response = await fetch(`${API_BASE}/v1/utilizadores/${id}`, {
          method: 'GET',
          headers: authHeaders(),
        });
        if (!response.ok) throw new Error('Erro ao carregar utilizador.');

        const item = await response.json();
        document.getElementById('recordId').textContent = item.id;
        document.getElementById('roleAtual').textContent = item.role || '';
        document.getElementById('nome').value = item.nome || '';
        document.getElementById('email').value = item.email || '';
      } catch (error) {
        message.textContent = error.message;
      }
    }

    document.getElementById('editForm').addEventListener('submit', async function (event) {
      event.preventDefault();
      const message = document.getElementById('message');

      const body = {
        nome: document.getElementById('nome').value,
        email: document.getElementById('email').value,
      };

      try {
        const response = await fetch(`${API_BASE}/v1/utilizadores/${id}`, {
          method: 'PUT',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify(body),
        });
        if (response.status === 200) {
          window.location.href = 'utilizadores.html';
        } else {
          const data = await response.json();
          message.textContent = data.error || 'Erro ao atualizar utilizador.';
        }
      } catch {
        message.textContent = 'Não foi possível ligar ao servidor.';
      }
    });

    async function eliminar() {
      const message = document.getElementById('message');
      if (!confirm('Tem a certeza que pretende eliminar esta conta?')) return;
      try {
        const response = await fetch(`${API_BASE}/v1/utilizadores/${id}`, {
          method: 'DELETE',
          headers: authHeaders(),
        });
        if (response.status === 204) {
          window.location.href = 'utilizadores.html';
        } else {
          const data = await response.json();
          message.textContent = data.error || 'Erro ao eliminar conta.';
        }
      } catch {
        message.textContent = 'Não foi possível ligar ao servidor.';
      }
    }

    loadUtilizador();
  </script>
</body>
</html>
