<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reservas - Biblioteca</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="content">
      <section class="topbar">
        <h1>Reservas</h1>
        <p id="subtitle"></p>
      </section>

      <section class="card">
        <table>
          <thead>
            <tr id="tableHead"></tr>
          </thead>
          <tbody id="reservasTable"></tbody>
        </table>

        <p id="empty" class="empty" style="display:none;">Sem reservas para mostrar.</p>
        <p id="message" class="message"></p>
      </section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script>
    checkAuth();
    document.getElementById('sidebar').innerHTML = renderSidebar('reservas.html');

    const staff = isStaff();
    document.getElementById('subtitle').textContent = staff
      ? 'Reservas em curso. Aceite ou termine cada reserva.'
      : 'As suas reservas. Pode cancelar as que ainda estão ativas.';

    // Staff vê o nome do cliente; o cliente não precisa dessa coluna.
    document.getElementById('tableHead').innerHTML = staff
      ? '<th>ID</th><th>Livro</th><th>Cliente</th><th>Estado</th><th>Data</th><th>Ações</th>'
      : '<th>ID</th><th>Livro</th><th>Estado</th><th>Data</th><th>Ações</th>';

    async function mudarEstado(id, estado) {
      const message = document.getElementById('message');
      try {
        const response = await fetch(`${API_BASE}/v1/reservas/${id}`, {
          method: 'PUT',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ estado }),
        });
        if (response.status === 200) {
          loadReservas();
        } else {
          const data = await response.json();
          message.textContent = data.error || 'Erro ao atualizar a reserva.';
        }
      } catch {
        message.textContent = 'Não foi possível ligar ao servidor.';
      }
    }

    function acoesCliente(r) {
      if (r.estado === 'ativa' || r.estado === 'aceite') {
        return `<button class="btn danger" onclick="mudarEstado(${r.id}, 'cancelada')">Cancelar</button>`;
      }
      return '<span class="muted">—</span>';
    }

    function acoesStaff(r) {
      let btns = '';
      if (r.estado === 'ativa') {
        btns += `<button class="btn accent" onclick="mudarEstado(${r.id}, 'aceite')">Aceitar</button> `;
      }
      if (r.estado === 'ativa' || r.estado === 'aceite') {
        btns += `<button class="btn" onclick="mudarEstado(${r.id}, 'terminada')">Terminar</button>`;
      }
      return btns || '<span class="muted">—</span>';
    }

    async function loadReservas() {
      const table = document.getElementById('reservasTable');
      const message = document.getElementById('message');
      const empty = document.getElementById('empty');
      message.textContent = '';
      empty.style.display = 'none';

      try {
        const response = await fetch(`${API_BASE}/v1/reservas`, {
          method: 'GET',
          headers: authHeaders(),
        });
        if (!response.ok) throw new Error('Erro ao carregar reservas.');

        const reservas = await response.json();
        table.innerHTML = '';

        if (!reservas.length) {
          empty.style.display = 'block';
          return;
        }

        reservas.forEach((r) => {
          const livro = r.livro_titulo || ('#' + r.livro_id);
          const acoes = staff ? acoesStaff(r) : acoesCliente(r);
          const row = document.createElement('tr');
          if (staff) {
            const cliente = r.utilizador_nome || ('#' + r.utilizador_id);
            row.innerHTML = `
              <td>${r.id}</td>
              <td>${livro}</td>
              <td>${cliente}</td>
              <td><span class="badge ${r.estado}">${r.estado}</span></td>
              <td>${r.data_reserva || ''}</td>
              <td>${acoes}</td>
            `;
          } else {
            row.innerHTML = `
              <td>${r.id}</td>
              <td>${livro}</td>
              <td><span class="badge ${r.estado}">${r.estado}</span></td>
              <td>${r.data_reserva || ''}</td>
              <td>${acoes}</td>
            `;
          }
          table.appendChild(row);
        });
      } catch (error) {
        message.textContent = error.message;
      }
    }

    loadReservas();
  </script>
</body>
</html>
