<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Reservas - Biblioteca</title>
  <style>
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #f4f7fb; color: #1f2937; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: #1e3a5f; color: white; padding: 28px 20px; box-sizing: border-box; }
    .sidebar h1 { margin: 0; font-size: 28px; text-align: center; }
    .sidebar h2 { margin: 8px 0 32px; font-size: 14px; font-weight: normal; text-align: center; color: #dbeafe; }
    .menu a { display: block; padding: 14px 16px; margin-bottom: 12px; color: white; text-decoration: none; border-radius: 10px; background: rgba(255,255,255,0.08); font-weight: bold; }
    .menu a:hover, .menu a.active { background: #2c5d8a; }
    .session-info { margin-top: 28px; font-size: 13px; color: #dbeafe; text-align: center; line-height: 1.5; }
    .session-info span { display: inline-block; margin-top: 4px; padding: 2px 10px; background: rgba(255,255,255,0.12); border-radius: 999px; font-weight: bold; }
    .logout { margin-top: 18px; width: 100%; padding: 14px; border: none; border-radius: 10px; background: #dc2626; color: white; font-weight: bold; cursor: pointer; }
    .logout:hover { background: #b91c1c; }
    .content { flex: 1; padding: 40px; box-sizing: border-box; }
    .topbar { background: linear-gradient(135deg, #1e3a5f, #2c5d8a); color: white; padding: 28px; border-radius: 16px; margin-bottom: 28px; }
    .topbar h1 { margin: 0; }
    .topbar p { margin: 8px 0 0; color: #e0f2fe; }
    .card { background: white; padding: 26px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    .btn { display: inline-block; padding: 10px 16px; border-radius: 10px; text-decoration: none; border: none; cursor: pointer; font-weight: bold; background: #1e3a5f; color: white; font-size: 14px; }
    .btn:hover { background: #2c5d8a; }
    .btn.accent { background: #3b82f6; }
    .btn.accent:hover { background: #2563eb; }
    .btn.danger { background: #dc2626; }
    .btn.danger:hover { background: #b91c1c; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #eef4fa; color: #1e3a5f; text-align: left; padding: 14px; }
    td { padding: 14px; border-top: 1px solid #e5e7eb; }
    .badge { padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: bold; }
    .badge.ativa { background: #dbeafe; color: #1e40af; }
    .badge.aceite { background: #fef3c7; color: #92400e; }
    .badge.terminada { background: #dcfce7; color: #166534; }
    .badge.cancelada { background: #fee2e2; color: #991b1b; }
    .message { text-align: center; color: #dc2626; margin-top: 20px; }
    .empty { text-align: center; color: #6b7280; margin-top: 20px; }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="content">
      <section class="topbar">
        <h1>Reservas</h1>
        <p id="subtitle"></p>
      </section>

      <section class="card">
        <table>
          <thead>
            <tr id="tableHead"></tr>
          </thead>
          <tbody id="reservasTable"></tbody>
        </table>

        <p id="empty" class="empty" style="display:none;">Sem reservas para mostrar.</p>
        <p id="message" class="message"></p>
      </section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script>
    const token = checkAuth();
    document.getElementById('sidebar').innerHTML = renderSidebar('reservas.html');

    const staff = isStaff();
    document.getElementById('subtitle').textContent = staff
      ? 'Reservas em curso. Aceite ou termine cada reserva.'
      : 'As suas reservas. Pode cancelar as que ainda estão ativas.';

    // Cabeçalho da tabela conforme o role.
    document.getElementById('tableHead').innerHTML = staff
      ? '<th>ID</th><th>Livro</th><th>Utilizador</th><th>Estado</th><th>Data</th><th>Ações</th>'
      : '<th>ID</th><th>Livro</th><th>Estado</th><th>Data</th><th>Ações</th>';

    let livrosMap = {};

    async function carregarLivrosMap() {
      try {
        const response = await fetch(`${API_BASE}/v1/livros`, { headers: authHeaders() });
        if (response.ok) {
          const livros = await response.json();
          livros.forEach((l) => { livrosMap[l.id] = l.titulo; });
        }
      } catch { /* ignora: mostra o id se falhar */ }
    }

    async function mudarEstado(id, estado) {
      const message = document.getElementById('message');
      try {
        const response = await fetch(`${API_BASE}/v1/reservas/${id}`, {
          method: 'PUT',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ estado }),
        });
        if (response.status === 200) {
          loadReservas();
        } else {
          const data = await response.json();
          message.textContent = data.error || 'Erro ao atualizar a reserva.';
        }
      } catch {
        message.textContent = 'Não foi possível ligar ao servidor.';
      }
    }

    function acoesCliente(r) {
      // Cliente pode cancelar reservas ainda em curso.
      if (r.estado === 'ativa' || r.estado === 'aceite') {
        return `<button class="btn danger" onclick="mudarEstado(${r.id}, 'cancelada')">Cancelar</button>`;
      }
      return '<span style="color:#6b7280;">—</span>';
    }

    function acoesStaff(r) {
      let btns = '';
      if (r.estado === 'ativa') {
        btns += `<button class="btn accent" onclick="mudarEstado(${r.id}, 'aceite')">Aceitar</button> `;
      }
      if (r.estado === 'ativa' || r.estado === 'aceite') {
        btns += `<button class="btn" onclick="mudarEstado(${r.id}, 'terminada')">Terminar</button>`;
      }
      return btns || '<span style="color:#6b7280;">—</span>';
    }

    async function loadReservas() {
      const table = document.getElementById('reservasTable');
      const message = document.getElementById('message');
      const empty = document.getElementById('empty');
      message.textContent = '';
      empty.style.display = 'none';

      try {
        const response = await fetch(`${API_BASE}/v1/reservas`, {
          method: 'GET',
          headers: authHeaders(),
        });
        if (!response.ok) throw new Error('Erro ao carregar reservas.');

        const reservas = await response.json();
        table.innerHTML = '';

        if (!reservas.length) {
          empty.style.display = 'block';
          return;
        }

        reservas.forEach((r) => {
          const livro = livrosMap[r.livro_id] || ('#' + r.livro_id);
          const acoes = staff ? acoesStaff(r) : acoesCliente(r);
          const row = document.createElement('tr');
          if (staff) {
            row.innerHTML = `
              <td>${r.id}</td>
              <td>${livro}</td>
              <td>#${r.utilizador_id}</td>
              <td><span class="badge ${r.estado}">${r.estado}</span></td>
              <td>${r.data_reserva || ''}</td>
              <td>${acoes}</td>
            `;
          } else {
            row.innerHTML = `
              <td>${r.id}</td>
              <td>${livro}</td>
              <td><span class="badge ${r.estado}">${r.estado}</span></td>
              <td>${r.data_reserva || ''}</td>
              <td>${acoes}</td>
            `;
          }
          table.appendChild(row);
        });
      } catch (error) {
        message.textContent = error.message;
      }
    }

    (async function init() {
      await carregarLivrosMap();
      await loadReservas();
    })();
  </script>
</body>
</html>
