<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Criar Livro - Biblioteca</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="container">
    <h1>Criar Livro</h1>
    <hr class="rule">

    <form id="createForm">
      <label for="titulo">Título</label>
      <input type="text" id="titulo" required>

      <label for="autor">Autor</label>
      <input type="text" id="autor" required>

      <label for="isbn">ISBN</label>
      <input type="text" id="isbn" required>

      <label for="quantidade">Quantidade (cópias em stock)</label>
      <input type="number" id="quantidade" min="0" value="1" required>

      <label for="estado">Estado</label>
      <select id="estado">
        <option value="disponivel">disponivel</option>
        <option value="indisponivel">indisponivel</option>
      </select>

      <button type="submit" class="btn">Guardar</button>
      <a href="livros.html" class="btn secondary">Voltar</a>

      <p id="message" class="message"></p>
    </form>
  </div>

  <script src="js/config.js"></script>
  <script>
    checkAuth();
    if (!isStaff()) {
      window.location.href = 'livros.html';
    }

    document.getElementById('createForm').addEventListener('submit', async function (event) {
      event.preventDefault();
      const message = document.getElementById('message');

      const body = {
        titulo: document.getElementById('titulo').value,
        autor: document.getElementById('autor').value,
        isbn: document.getElementById('isbn').value,
        quantidade: Number(document.getElementById('quantidade').value),
        estado: document.getElementById('estado').value,
      };

      try {
        const response = await fetch(`${API_BASE}/v1/livros`, {
          method: 'POST',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify(body),
        });

        if (response.status === 201) {
          window.location.href = 'livros.html';
        } else {
          const data = await response.json();
          message.textContent = data.error || 'Erro ao criar livro.';
        }
      } catch {
        message.textContent = 'Não foi possível ligar ao servidor.';
      }
    });
  </script>
</body>
</html>
