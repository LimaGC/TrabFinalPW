<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Utilizadores - Biblioteca</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="content">
      <section class="topbar">
        <h1>Utilizadores</h1>
        <p>Gestão de contas: editar, eliminar e promover/despromover.</p>
      </section>

      <section class="card">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Email</th>
              <th>Role</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="utilizadoresTable"></tbody>
        </table>

        <p id="message" class="message"></p>
      </section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script>
    checkAuth();
    // Página exclusiva de admin.
    if (!isAdmin()) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('sidebar').innerHTML = renderSidebar('utilizadores.html');

    async function alterarRole(id, role) {
      const message = document.getElementById('message');
      try {
        const response = await fetch(`${API_BASE}/v1/utilizadores/${id}/role`, {
          method: 'PUT',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ role }),
        });
        if (response.status === 200) {
          loadUtilizadores();
        } else {
          const data = await response.json();
          message.textContent = data.error || 'Erro ao alterar o role.';
        }
      } catch {
        message.textContent = 'Não foi possível ligar ao servidor.';
      }
    }

    async function eliminar(id) {
      const message = document.getElementById('message');
      if (!confirm('Tem a certeza que pretende eliminar esta conta?')) return;
      try {
        const response = await fetch(`${API_BASE}/v1/utilizadores/${id}`, {
          method: 'DELETE',
          headers: authHeaders(),
        });
        if (response.status === 204) {
          loadUtilizadores();
        } else {
          const data = await response.json();
          message.textContent = data.error || 'Erro ao eliminar conta.';
        }
      } catch {
        message.textContent = 'Não foi possível ligar ao servidor.';
      }
    }

    function acoesRole(u) {
      // Promover/despromover apenas entre cliente e bibliotecario.
      if (u.role === 'cliente') {
        return `<button class="btn accent" onclick="alterarRole(${u.id}, 'bibliotecario')">Promover</button>`;
      }
      if (u.role === 'bibliotecario') {
        return `<button class="btn" onclick="alterarRole(${u.id}, 'cliente')">Despromover</button>`;
      }
      return '';
    }

    async function loadUtilizadores() {
      const table = document.getElementById('utilizadoresTable');
      const message = document.getElementById('message');
      message.textContent = '';

      try {
        const response = await fetch(`${API_BASE}/v1/utilizadores`, {
          method: 'GET',
          headers: authHeaders(),
        });
        if (!response.ok) throw new Error('Erro ao carregar utilizadores.');

        const utilizadores = await response.json();
        table.innerHTML = '';

        utilizadores.forEach((u) => {
          const role = u.role || 'cliente';
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${u.id}</td>
            <td>${u.nome || ''}</td>
            <td>${u.email || ''}</td>
            <td><span class="badge ${role}">${role}</span></td>
            <td>
              <a class="btn" href="utilizadores-edit.html?id=${u.id}">Editar</a>
              ${acoesRole(u)}
              <button class="btn danger" onclick="eliminar(${u.id})">Eliminar</button>
            </td>
          `;
          table.appendChild(row);
        });
      } catch (error) {
        message.textContent = error.message;
      }
    }

    loadUtilizadores();
  </script>
</body>
</html>
