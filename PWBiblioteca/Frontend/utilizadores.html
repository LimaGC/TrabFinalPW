<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Utilizadores - Biblioteca</title>
  <style>
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #f4f7fb; color: #1f2937; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: #1e3a5f; color: white; padding: 28px 20px; box-sizing: border-box; }
    .sidebar h1 { margin: 0; font-size: 28px; text-align: center; }
    .sidebar h2 { margin: 8px 0 32px; font-size: 14px; font-weight: normal; text-align: center; color: #dbeafe; }
    .menu a { display: block; padding: 14px 16px; margin-bottom: 12px; color: white; text-decoration: none; border-radius: 10px; background: rgba(255,255,255,0.08); font-weight: bold; }
    .menu a:hover, .menu a.active { background: #2c5d8a; }
    .session-info { margin-top: 28px; font-size: 13px; color: #dbeafe; text-align: center; line-height: 1.5; }
    .session-info span { display: inline-block; margin-top: 4px; padding: 2px 10px; background: rgba(255,255,255,0.12); border-radius: 999px; font-weight: bold; }
    .logout { margin-top: 18px; width: 100%; padding: 14px; border: none; border-radius: 10px; background: #dc2626; color: white; font-weight: bold; cursor: pointer; }
    .logout:hover { background: #b91c1c; }
    .content { flex: 1; padding: 40px; box-sizing: border-box; }
    .topbar { background: linear-gradient(135deg, #1e3a5f, #2c5d8a); color: white; padding: 28px; border-radius: 16px; margin-bottom: 28px; }
    .topbar h1 { margin: 0; }
    .topbar p { margin: 8px 0 0; color: #e0f2fe; }
    .card { background: white; padding: 26px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    .btn { display: inline-block; padding: 10px 16px; border-radius: 10px; text-decoration: none; border: none; cursor: pointer; font-weight: bold; background: #1e3a5f; color: white; font-size: 14px; }
    .btn:hover { background: #2c5d8a; }
    .btn.accent { background: #3b82f6; }
    .btn.accent:hover { background: #2563eb; }
    .btn.danger { background: #dc2626; }
    .btn.danger:hover { background: #b91c1c; }
    .btn:disabled { background: #9ca3af; cursor: not-allowed; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #eef4fa; color: #1e3a5f; text-align: left; padding: 14px; }
    td { padding: 14px; border-top: 1px solid #e5e7eb; }
    .badge { padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: bold; }
    .badge.cliente { background: #dbeafe; color: #1e40af; }
    .badge.bibliotecario { background: #fef3c7; color: #92400e; }
    .badge.admin { background: #ede9fe; color: #5b21b6; }
    .message { text-align: center; color: #dc2626; margin-top: 20px; }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="content">
      <section class="topbar">
        <h1>Utilizadores</h1>
        <p>Gestão de contas: editar, eliminar e promover/despromover.</p>
      </section>

      <section class="card">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Email</th>
              <th>Role</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="utilizadoresTable"></tbody>
        </table>

        <p id="message" class="message"></p>
      </section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script>
    checkAuth();
    // Página exclusiva de admin.
    if (!isAdmin()) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('sidebar').innerHTML = renderSidebar('utilizadores.html');

    async function alterarRole(id, role) {
      const message = document.getElementById('message');
      try {
        const response = await fetch(`${API_BASE}/v1/utilizadores/${id}/role`, {
          method: 'PUT',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ role }),
        });
        if (response.status === 200) {
          loadUtilizadores();
        } else {
          const data = await response.json();
          message.textContent = data.error || 'Erro ao alterar o role.';
        }
      } catch {
        message.textContent = 'Não foi possível ligar ao servidor.';
      }
    }

    async function eliminar(id) {
      const message = document.getElementById('message');
      if (!confirm('Tem a certeza que pretende eliminar esta conta?')) return;
      try {
        const response = await fetch(`${API_BASE}/v1/utilizadores/${id}`, {
          method: 'DELETE',
          headers: authHeaders(),
        });
        if (response.status === 204) {
          loadUtilizadores();
        } else {
          const data = await response.json();
          message.textContent = data.error || 'Erro ao eliminar conta.';
        }
      } catch {
        message.textContent = 'Não foi possível ligar ao servidor.';
      }
    }

    function acoesRole(u) {
      // Promover/despromover apenas entre cliente e bibliotecario.
      if (u.role === 'cliente') {
        return `<button class="btn accent" onclick="alterarRole(${u.id}, 'bibliotecario')">Promover</button>`;
      }
      if (u.role === 'bibliotecario') {
        return `<button class="btn" onclick="alterarRole(${u.id}, 'cliente')">Despromover</button>`;
      }
      return '';
    }

    async function loadUtilizadores() {
      const table = document.getElementById('utilizadoresTable');
      const message = document.getElementById('message');
      message.textContent = '';

      try {
        const response = await fetch(`${API_BASE}/v1/utilizadores`, {
          method: 'GET',
          headers: authHeaders(),
        });
        if (!response.ok) throw new Error('Erro ao carregar utilizadores.');

        const utilizadores = await response.json();
        table.innerHTML = '';

        utilizadores.forEach((u) => {
          const role = u.role || 'cliente';
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${u.id}</td>
            <td>${u.nome || ''}</td>
            <td>${u.email || ''}</td>
            <td><span class="badge ${role}">${role}</span></td>
            <td>
              <a class="btn" href="utilizadores-edit.html?id=${u.id}">Editar</a>
              ${acoesRole(u)}
              <button class="btn danger" onclick="eliminar(${u.id})">Eliminar</button>
            </td>
          `;
          table.appendChild(row);
        });
      } catch (error) {
        message.textContent = error.message;
      }
    }

    loadUtilizadores();
  </script>
</body>
</html>
