<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In - Biblioteca</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">

  <div class="signin-container">
    <div class="signin-header">
      <h1>Biblioteca</h1>
      <h2>Gestão de Biblioteca</h2>
    </div>

    <div class="signin-body">
      <h2>Bem-vindo</h2>
      <hr class="rule">

      <form id="loginForm">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Introduza o seu email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Introduza a sua password" required>

        <button type="submit" id="loginButton">Entrar</button>

        <p id="message" class="message"></p>
      </form>

      <div class="extra-links">
        <p><a href="forgot-password.html">Recuperar password</a></p>
        <p>Ainda não tem conta? <a href="register.html">Criar conta</a></p>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');
    const loginButton = document.getElementById('loginButton');
    const message = document.getElementById('message');

    loginForm.addEventListener('submit', async function (event) {
      event.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      message.textContent = '';
      message.className = 'message';
      loginButton.disabled = true;
      loginButton.textContent = 'A autenticar...';

      try {
        const response = await fetch(`${API_BASE}/auths/signin`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          // Bug corrigido: o backend espera "password" (e não "pass").
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (response.status === 200) {
          saveSession(data.token, email);
          message.textContent = 'Login efetuado com sucesso.';
          message.classList.add('success');
          window.location.href = 'dashboard.html';
        } else {
          message.textContent = data.error || 'Erro de autenticação.';
          message.classList.add('error');
        }
      } catch (error) {
        console.error(error);
        message.textContent = 'Não foi possível ligar ao servidor.';
        message.classList.add('error');
      }

      loginButton.disabled = false;
      loginButton.textContent = 'Entrar';
    });
  </script>

</body>
</html>
