<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Criar Conta - Biblioteca</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">

  <div class="signin-container">
    <div class="signin-header">
      <h1>Biblioteca</h1>
      <h2>Criar Conta</h2>
    </div>

    <div class="signin-body">
      <h2>Nova conta</h2>
      <hr class="rule">

      <form id="registerForm">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="O seu nome" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="O seu email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Defina uma password" required>

        <button type="submit" id="registerButton">Criar conta</button>

        <p id="message" class="message"></p>
      </form>

      <div class="extra-links">
        <p>Já tem conta? <a href="login.html">Entrar</a></p>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    const registerForm = document.getElementById('registerForm');
    const registerButton = document.getElementById('registerButton');
    const message = document.getElementById('message');

    registerForm.addEventListener('submit', async function (event) {
      event.preventDefault();

      const nome = document.getElementById('nome').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      message.textContent = '';
      message.className = 'message';
      registerButton.disabled = true;
      registerButton.textContent = 'A criar...';

      try {
        const response = await fetch(`${API_BASE}/auths/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome, email, password }),
        });

        const data = await response.json();

        if (response.status === 201) {
          message.textContent = 'Conta criada com sucesso. A redirecionar para o login...';
          message.classList.add('success');
          setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        } else {
          message.textContent = data.error || 'Erro ao criar conta.';
          message.classList.add('error');
        }
      } catch (error) {
        console.error(error);
        message.textContent = 'Não foi possível ligar ao servidor.';
        message.classList.add('error');
      }

      registerButton.disabled = false;
      registerButton.textContent = 'Criar conta';
    });
  </script>

</body>
</html>
