<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Livros - Biblioteca</title>
  <style>
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #f4f7fb; color: #1f2937; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: #1e3a5f; color: white; padding: 28px 20px; box-sizing: border-box; }
    .sidebar h1 { margin: 0; font-size: 28px; text-align: center; }
    .sidebar h2 { margin: 8px 0 32px; font-size: 14px; font-weight: normal; text-align: center; color: #dbeafe; }
    .menu a { display: block; padding: 14px 16px; margin-bottom: 12px; color: white; text-decoration: none; border-radius: 10px; background: rgba(255,255,255,0.08); font-weight: bold; }
    .menu a:hover, .menu a.active { background: #2c5d8a; }
    .session-info { margin-top: 28px; font-size: 13px; color: #dbeafe; text-align: center; line-height: 1.5; }
    .session-info span { display: inline-block; margin-top: 4px; padding: 2px 10px; background: rgba(255,255,255,0.12); border-radius: 999px; font-weight: bold; }
    .logout { margin-top: 18px; width: 100%; padding: 14px; border: none; border-radius: 10px; background: #dc2626; color: white; font-weight: bold; cursor: pointer; }
    .logout:hover { background: #b91c1c; }
    .content { flex: 1; padding: 40px; box-sizing: border-box; }
    .topbar { background: linear-gradient(135deg, #1e3a5f, #2c5d8a); color: white; padding: 28px; border-radius: 16px; margin-bottom: 28px; }
    .topbar h1 { margin: 0; }
    .topbar p { margin: 8px 0 0; color: #e0f2fe; }
    .card { background: white; padding: 26px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    .actions { margin-bottom: 20px; text-align: right; }
    .btn { display: inline-block; padding: 10px 16px; border-radius: 10px; text-decoration: none; border: none; cursor: pointer; font-weight: bold; background: #1e3a5f; color: white; font-size: 14px; }
    .btn:hover { background: #2c5d8a; }
    .btn.accent { background: #3b82f6; }
    .btn.accent:hover { background: #2563eb; }
    .btn.danger { background: #dc2626; }
    .btn.danger:hover { background: #b91c1c; }
    .btn:disabled { background: #9ca3af; cursor: not-allowed; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #eef4fa; color: #1e3a5f; text-align: left; padding: 14px; }
    td { padding: 14px; border-top: 1px solid #e5e7eb; }
    .badge { padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: bold; }
    .badge.disponivel { background: #dcfce7; color: #166534; }
    .badge.reservado { background: #fee2e2; color: #991b1b; }
    .message { text-align: center; color: #dc2626; margin-top: 20px; }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="content">
      <section class="topbar">
        <h1>Livros</h1>
        <p id="subtitle">Catálogo da biblioteca.</p>
      </section>

      <section class="card">
        <div class="actions" id="actions"></div>

        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Título</th>
              <th>Autor</th>
              <th>ISBN</th>
              <th>Estado</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="livrosTable"></tbody>
        </table>

        <p id="message" class="message"></p>
      </section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script>
    const token = checkAuth();
    document.getElementById('sidebar').innerHTML = renderSidebar('livros.html');

    const staff = isStaff();
    document.getElementById('subtitle').textContent = staff
      ? 'Gestão do catálogo: criar, editar e eliminar livros.'
      : 'Consulte os livros e reserve os que estão disponíveis.';

    // Botão CREATE apenas para bibliotecario/admin.
    if (staff) {
      document.getElementById('actions').innerHTML =
        '<a href="livros-create.html" class="btn">CREATE</a>';
    }

    async function reservar(livroId) {
      const message = document.getElementById('message');
      try {
        const response = await fetch(`${API_BASE}/v1/reservas`, {
          method: 'POST',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ livro_id: livroId }),
        });
        if (response.status === 201) {
          loadLivros();
        } else {
          const data = await response.json();
          message.textContent = data.error || 'Erro ao reservar.';
        }
      } catch {
        message.textContent = 'Não foi possível ligar ao servidor.';
      }
    }

    async function eliminar(livroId) {
      const message = document.getElementById('message');
      if (!confirm('Tem a certeza que pretende eliminar este livro?')) return;
      try {
        const response = await fetch(`${API_BASE}/v1/livros/${livroId}`, {
          method: 'DELETE',
          headers: authHeaders(),
        });
        if (response.status === 204) {
          loadLivros();
        } else {
          const data = await response.json();
          message.textContent = data.error || 'Erro ao eliminar.';
        }
      } catch {
        message.textContent = 'Não foi possível ligar ao servidor.';
      }
    }

    async function loadLivros() {
      const table = document.getElementById('livrosTable');
      const message = document.getElementById('message');
      message.textContent = '';

      try {
        const response = await fetch(`${API_BASE}/v1/livros`, {
          method: 'GET',
          headers: authHeaders(),
        });

        if (!response.ok) throw new Error('Erro ao carregar livros.');

        const livros = await response.json();
        table.innerHTML = '';

        livros.forEach((item) => {
          const estado = item.estado || 'disponivel';
          let acoes = '';

          if (staff) {
            acoes = `
              <a class="btn" href="livros-edit.html?id=${item.id}">Editar</a>
              <button class="btn danger" onclick="eliminar(${item.id})">Eliminar</button>
            `;
          } else if (estado === 'disponivel') {
            acoes = `<button class="btn accent" onclick="reservar(${item.id})">Reservar</button>`;
          } else {
            acoes = '<span style="color:#6b7280;">Indisponível</span>';
          }

          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${item.id}</td>
            <td>${item.titulo || ''}</td>
            <td>${item.autor || ''}</td>
            <td>${item.isbn || ''}</td>
            <td><span class="badge ${estado}">${estado}</span></td>
            <td>${acoes}</td>
          `;
          table.appendChild(row);
        });
      } catch (error) {
        message.textContent = error.message;
      }
    }

    loadLivros();
  </script>
</body>
</html>
