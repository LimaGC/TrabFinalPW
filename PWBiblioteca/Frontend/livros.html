<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Livros - Biblioteca</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="content">
      <section class="topbar">
        <h1>Livros</h1>
        <p id="subtitle">Catálogo da biblioteca.</p>
      </section>

      <section class="card">
        <div class="actions" id="actions"></div>

        <table>
          <thead>
            <tr id="tableHead"></tr>
          </thead>
          <tbody id="livrosTable"></tbody>
        </table>

        <p id="message" class="message"></p>
      </section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script>
    checkAuth();
    document.getElementById('sidebar').innerHTML = renderSidebar('livros.html');

    const staff = isStaff();
    document.getElementById('subtitle').textContent = staff
      ? 'Gestão do catálogo: criar, editar, eliminar e gerir o stock.'
      : 'Consulte os livros e reserve os que estão disponíveis.';

    // Botão CREATE apenas para bibliotecario/admin.
    if (staff) {
      document.getElementById('actions').innerHTML =
        '<a href="livros-create.html" class="btn">CREATE</a>';
    }

    // Cabeçalho: staff vê estado + stock; cliente vê só disponibilidade.
    document.getElementById('tableHead').innerHTML = staff
      ? '<th>ID</th><th>Título</th><th>Autor</th><th>ISBN</th><th>Estado</th><th>Stock</th><th>Ações</th>'
      : '<th>ID</th><th>Título</th><th>Autor</th><th>ISBN</th><th>Disponibilidade</th><th>Ações</th>';

    async function reservar(livroId) {
      const message = document.getElementById('message');
      try {
        const response = await fetch(`${API_BASE}/v1/reservas`, {
          method: 'POST',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ livro_id: livroId }),
        });
        if (response.status === 201) {
          loadLivros();
        } else {
          const data = await response.json();
          message.textContent = data.error || 'Erro ao reservar.';
        }
      } catch {
        message.textContent = 'Não foi possível ligar ao servidor.';
      }
    }

    async function eliminar(livroId) {
      const message = document.getElementById('message');
      if (!confirm('Tem a certeza que pretende eliminar este livro?')) return;
      try {
        const response = await fetch(`${API_BASE}/v1/livros/${livroId}`, {
          method: 'DELETE',
          headers: authHeaders(),
        });
        if (response.status === 204) {
          loadLivros();
        } else {
          const data = await response.json();
          message.textContent = data.error || 'Erro ao eliminar.';
        }
      } catch {
        message.textContent = 'Não foi possível ligar ao servidor.';
      }
    }

    async function loadLivros() {
      const table = document.getElementById('livrosTable');
      const message = document.getElementById('message');
      message.textContent = '';

      try {
        const response = await fetch(`${API_BASE}/v1/livros`, {
          method: 'GET',
          headers: authHeaders(),
        });
        if (!response.ok) throw new Error('Erro ao carregar livros.');

        const livros = await response.json();
        table.innerHTML = '';

        livros.forEach((item) => {
          const row = document.createElement('tr');

          if (staff) {
            // Estado manual + stock (disponíveis / total).
            const acoes = `
              <a class="btn" href="livros-edit.html?id=${item.id}">Editar</a>
              <button class="btn danger" onclick="eliminar(${item.id})">Eliminar</button>
            `;
            row.innerHTML = `
              <td>${item.id}</td>
              <td>${item.titulo || ''}</td>
              <td>${item.autor || ''}</td>
              <td>${item.isbn || ''}</td>
              <td><span class="badge ${item.estado}">${item.estado}</span></td>
              <td><span class="stock">${item.disponiveis}<small> / ${item.quantidade}</small></span></td>
              <td>${acoes}</td>
            `;
          } else {
            // Cliente vê apenas disponível/indisponível (sem quantidade).
            const disp = item.disponivel;
            const badge = disp ? 'disponivel' : 'indisponivel';
            const label = disp ? 'disponivel' : 'indisponivel';
            const acoes = disp
              ? `<button class="btn accent" onclick="reservar(${item.id})">Reservar</button>`
              : '<span class="muted">—</span>';
            row.innerHTML = `
              <td>${item.id}</td>
              <td>${item.titulo || ''}</td>
              <td>${item.autor || ''}</td>
              <td>${item.isbn || ''}</td>
              <td><span class="badge ${badge}">${label}</span></td>
              <td>${acoes}</td>
            `;
          }

          table.appendChild(row);
        });
      } catch (error) {
        message.textContent = error.message;
      }
    }

    loadLivros();
  </script>
</body>
</html>
