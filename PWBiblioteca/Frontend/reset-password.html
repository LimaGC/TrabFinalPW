<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Definir Nova Password - Biblioteca</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">

  <div class="signin-container">
    <div class="signin-header">
      <h1>Biblioteca</h1>
      <h2>Nova Password</h2>
    </div>

    <div class="signin-body">
      <h2>Definir nova password</h2>
      <hr class="rule">

      <form id="resetForm">
        <label for="resetToken">Token de reset</label>
        <textarea id="resetToken" name="resetToken" placeholder="Cole aqui o token de reset" required></textarea>

        <label for="password">Nova password</label>
        <input type="password" id="password" name="password" placeholder="Nova password" required>

        <button type="submit" id="resetButton">Atualizar password</button>

        <p id="message" class="message"></p>
      </form>

      <div class="extra-links">
        <p><a href="login.html">Voltar ao login</a></p>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    const resetForm = document.getElementById('resetForm');
    const resetButton = document.getElementById('resetButton');
    const message = document.getElementById('message');

    // Pré-preenche o token a partir do query string (?token=...).
    const params = new URLSearchParams(window.location.search);
    const tokenFromUrl = params.get('token');
    if (tokenFromUrl) {
      document.getElementById('resetToken').value = tokenFromUrl;
    }

    resetForm.addEventListener('submit', async function (event) {
      event.preventDefault();

      const resetToken = document.getElementById('resetToken').value.trim();
      const password = document.getElementById('password').value;

      message.textContent = '';
      message.className = 'message';
      resetButton.disabled = true;
      resetButton.textContent = 'A atualizar...';

      try {
        const response = await fetch(`${API_BASE}/auths/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ resetToken, password }),
        });

        const data = await response.json();

        if (response.status === 200) {
          message.textContent = 'Password atualizada. A redirecionar para o login...';
          message.classList.add('success');
          setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        } else {
          message.textContent = data.error || 'Erro ao atualizar a password.';
          message.classList.add('error');
        }
      } catch (error) {
        console.error(error);
        message.textContent = 'Não foi possível ligar ao servidor.';
        message.classList.add('error');
      }

      resetButton.disabled = false;
      resetButton.textContent = 'Atualizar password';
    });
  </script>

</body>
</html>
