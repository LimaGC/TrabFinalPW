<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Definir Nova Password - Biblioteca</title>

  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .signin-container {
      width: 100%;
      max-width: 460px;
      margin: 60px auto;
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .signin-header {
      background: linear-gradient(135deg, #1e3a5f, #2c5d8a);
      color: white;
      padding: 32px;
      text-align: center;
    }

    .signin-header h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: 1px;
    }

    .signin-header h2 {
      margin: 8px 0 0;
      font-size: 16px;
      font-weight: normal;
      color: white;
    }

    .signin-body {
      padding: 32px;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 20px;
      color: #1e3a5f;
    }

    hr {
      border: none;
      height: 3px;
      width: 60px;
      background: #3b82f6;
      margin: 0 0 24px 0;
      border-radius: 999px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #374151;
    }

    input, textarea {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 18px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #1e3a5f;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #2c5d8a;
    }

    .message {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
    }

    .error {
      color: #dc2626;
    }

    .success {
      color: #16a34a;
    }

    .extra-links {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="signin-container">
    <div class="signin-header">
      <h1>Biblioteca</h1>
      <h2>Nova Password</h2>
    </div>

    <div class="signin-body">
      <h2>Definir nova password</h2>
      <hr>

      <form id="resetForm">
        <label for="resetToken">Token de reset</label>
        <textarea id="resetToken" name="resetToken" placeholder="Cole aqui o token de reset" required></textarea>

        <label for="password">Nova password</label>
        <input type="password" id="password" name="password" placeholder="Nova password" required>

        <button type="submit" id="resetButton">Atualizar password</button>

        <p id="message" class="message"></p>
      </form>

      <div class="extra-links">
        <p><a href="login.html">Voltar ao login</a></p>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    const resetForm = document.getElementById('resetForm');
    const resetButton = document.getElementById('resetButton');
    const message = document.getElementById('message');

    // Pré-preenche o token a partir do query string (?token=...).
    const params = new URLSearchParams(window.location.search);
    const tokenFromUrl = params.get('token');
    if (tokenFromUrl) {
      document.getElementById('resetToken').value = tokenFromUrl;
    }

    resetForm.addEventListener('submit', async function (event) {
      event.preventDefault();

      const resetToken = document.getElementById('resetToken').value.trim();
      const password = document.getElementById('password').value;

      message.textContent = '';
      message.className = 'message';
      resetButton.disabled = true;
      resetButton.textContent = 'A atualizar...';

      try {
        const response = await fetch(`${API_BASE}/auths/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ resetToken, password }),
        });

        const data = await response.json();

        if (response.status === 200) {
          message.textContent = 'Password atualizada. A redirecionar para o login...';
          message.classList.add('success');
          setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        } else {
          message.textContent = data.error || 'Erro ao atualizar a password.';
          message.classList.add('error');
        }
      } catch (error) {
        console.error(error);
        message.textContent = 'Não foi possível ligar ao servidor.';
        message.classList.add('error');
      }

      resetButton.disabled = false;
      resetButton.textContent = 'Atualizar password';
    });
  </script>

</body>
</html>
