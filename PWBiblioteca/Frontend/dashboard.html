<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - Biblioteca</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="layout">

    <aside class="sidebar" id="sidebar"></aside>

    <main class="content">
      <section class="topbar">
        <h1>Dashboard</h1>
        <p id="welcome">Bem-vindo à área de gestão da biblioteca.</p>
      </section>

      <section class="cards" id="cards"></section>
    </main>

  </div>

  <script src="js/config.js"></script>
  <script>
    checkAuth();

    document.getElementById('sidebar').innerHTML = renderSidebar('dashboard.html');

    const role = getRole();
    const cardsEl = document.getElementById('cards');

    const cards = [
      {
        title: 'Catálogo de Livros',
        text: role === 'cliente'
          ? 'Consultar os livros e reservar os que estão disponíveis.'
          : 'Consultar, criar, editar e eliminar livros e gerir o stock.',
        href: 'livros.html',
        link: 'Ir para Livros',
        roles: ['cliente', 'bibliotecario', 'admin'],
      },
      {
        title: 'Reservas',
        text: role === 'cliente'
          ? 'Ver as suas reservas e cancelá-las.'
          : 'Gerir todas as reservas em curso: aceitar e terminar.',
        href: 'reservas.html',
        link: 'Ir para Reservas',
        roles: ['cliente', 'bibliotecario', 'admin'],
      },
      {
        title: 'Gestão de Contas',
        text: 'Listar, editar, eliminar e promover/despromover utilizadores.',
        href: 'utilizadores.html',
        link: 'Ir para Utilizadores',
        roles: ['admin'],
      },
      {
        title: 'O Meu Perfil',
        text: 'Atualizar os seus dados pessoais e alterar a sua password.',
        href: 'perfil.html',
        link: 'Ir para o Perfil',
        roles: ['cliente', 'bibliotecario', 'admin'],
      },
    ];

    cardsEl.innerHTML = cards
      .filter((c) => c.roles.includes(role))
      .map((c) => `
        <div class="card">
          <h2>${c.title}</h2>
          <hr class="rule">
          <p>${c.text}</p>
          <a href="${c.href}">${c.link}</a>
        </div>
      `).join('');
  </script>

</body>
</html>
