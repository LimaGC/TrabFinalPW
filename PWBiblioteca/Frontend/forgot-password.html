<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Recuperar Password - Biblioteca</title>

  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .signin-container {
      width: 100%;
      max-width: 460px;
      margin: 60px auto;
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .signin-header {
      background: linear-gradient(135deg, #1e3a5f, #2c5d8a);
      color: white;
      padding: 32px;
      text-align: center;
    }

    .signin-header h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: 1px;
    }

    .signin-header h2 {
      margin: 8px 0 0;
      font-size: 16px;
      font-weight: normal;
      color: white;
    }

    .signin-body {
      padding: 32px;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 20px;
      color: #1e3a5f;
    }

    hr {
      border: none;
      height: 3px;
      width: 60px;
      background: #3b82f6;
      margin: 0 0 24px 0;
      border-radius: 999px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #374151;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 18px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #1e3a5f;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #2c5d8a;
    }

    .message {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
    }

    .error {
      color: #dc2626;
    }

    .success {
      color: #16a34a;
    }

    .token-box {
      margin-top: 18px;
      padding: 16px;
      background: #eef4fa;
      border-radius: 10px;
      font-size: 13px;
      word-break: break-all;
      display: none;
    }

    .token-box strong {
      color: #1e3a5f;
    }

    .extra-links {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="signin-container">
    <div class="signin-header">
      <h1>Biblioteca</h1>
      <h2>Recuperar Password</h2>
    </div>

    <div class="signin-body">
      <h2>Pedir token de reset</h2>
      <hr>

      <p style="color:#6b7280;font-size:14px;margin-top:0;">
        Não existe envio de email real neste projeto. O token de reset é
        devolvido aqui para que possa usá-lo na página de definição de nova password.
      </p>

      <form id="forgotForm">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="O seu email" required>

        <button type="submit" id="forgotButton">Gerar token de reset</button>

        <p id="message" class="message"></p>
      </form>

      <div class="token-box" id="tokenBox">
        <p><strong>Token de reset:</strong></p>
        <p id="tokenValue"></p>
        <p><a id="resetLink" href="#">Continuar para definir nova password &raquo;</a></p>
      </div>

      <div class="extra-links">
        <p><a href="login.html">Voltar ao login</a></p>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    const forgotForm = document.getElementById('forgotForm');
    const forgotButton = document.getElementById('forgotButton');
    const message = document.getElementById('message');
    const tokenBox = document.getElementById('tokenBox');
    const tokenValue = document.getElementById('tokenValue');
    const resetLink = document.getElementById('resetLink');

    forgotForm.addEventListener('submit', async function (event) {
      event.preventDefault();

      const email = document.getElementById('email').value;

      message.textContent = '';
      message.className = 'message';
      tokenBox.style.display = 'none';
      forgotButton.disabled = true;
      forgotButton.textContent = 'A gerar...';

      try {
        const response = await fetch(`${API_BASE}/auths/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });

        const data = await response.json();

        if (response.status === 200) {
          message.textContent = 'Token gerado com sucesso.';
          message.classList.add('success');
          tokenValue.textContent = data.resetToken;
          resetLink.href = 'reset-password.html?token=' + encodeURIComponent(data.resetToken);
          tokenBox.style.display = 'block';
        } else {
          message.textContent = data.error || 'Erro ao gerar token.';
          message.classList.add('error');
        }
      } catch (error) {
        console.error(error);
        message.textContent = 'Não foi possível ligar ao servidor.';
        message.classList.add('error');
      }

      forgotButton.disabled = false;
      forgotButton.textContent = 'Gerar token de reset';
    });
  </script>

</body>
</html>
